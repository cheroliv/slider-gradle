<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Présentations Reveal.js</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h1 class="card-title mb-0">
            <i class="bi bi-collection-play me-2"></i>
            Présentations Reveal.js
          </h1>
        </div>
        <div class="card-body">
          <div id="presentations-list" class="row g-3">
            <!-- Les présentations seront listées ici -->
          </div>
          <div id="no-presentations" class="text-center text-muted py-5" style="display: none;">
            <i class="bi bi-folder2-open display-1"></i>
            <p class="mt-3">Aucune présentation trouvée</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script>
  // Liste des fichiers HTML (à adapter selon vos fichiers)
  const presentations = [
      'presentation-marketing.html',
      'formation-technique.html',
      'reunion-equipe.html',
      'demo-produit.html',
      'analyse-donnees.html'
  ];

  function formatFileName(filename) {
      // Retire l'extension .html et remplace les tirets/underscores par des espaces
      return filename
          .replace('.html', '')
          .replace(/[-_]/g, ' ')
          .split(' ')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1))
          .join(' ');
  }

  function createPresentationCard(filename) {
      const formattedName = formatFileName(filename);

      return `
          <div class="col-md-6 col-lg-4">
              <div class="card h-100 border-0 shadow-sm">
                  <div class="card-body d-flex flex-column">
                      <div class="mb-3">
                          <i class="bi bi-file-earmark-slides text-primary display-6"></i>
                      </div>
                      <h5 class="card-title">${formattedName}</h5>
                      <div class="mt-auto">
                          <button class="btn btn-primary w-100" onclick="openPresentation('${filename}')">
                              <i class="bi bi-box-arrow-up-right me-2"></i>
                              Ouvrir
                          </button>
                      </div>
                  </div>
              </div>
          </div>
      `;
  }

  function openPresentation(filename) {
      window.open(filename, '_blank');
  }

  function loadPresentations() {
      const listContainer = document.getElementById('presentations-list');
      const noPresContainer = document.getElementById('no-presentations');

      if (presentations.length === 0) {
          noPresContainer.style.display = 'block';
          return;
      }

      const cardsHTML = presentations.map(createPresentationCard).join('');
      listContainer.innerHTML = cardsHTML;
  }

  // Charger les présentations au chargement de la page
  document.addEventListener('DOMContentLoaded', loadPresentations);
</script>
</body>
</html>
