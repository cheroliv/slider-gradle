[versions]
slider = "0.0.5"
asciidoctor-gradle = "5.0.0-alpha.1"
node-gradle = "7.1.0"
commons-io = "2.13.0"
jgit = "7.5.0.202512021534-r"
slf4j = "2.0.17"
xz = "1.12"
asciidoctorj-diagram = "3.2.0"
asciidoctorj-diagram-plantuml = "1.2025.3"
kotlin = "2.3.20"
junit-platform-launcher = "1.10.2"
mockito-kotlin = "6.2.3"
mockito-jupiter = "5.23.0"
gradle = "9.4.0"
assertj = "3.27.7"
plugin-publish = "2.1.0"
cucumber = "7.34.3"
