services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: slider-pgvector
    environment:
      POSTGRES_DB: slider_rag
      POSTGRES_USER: slider
      POSTGRES_PASSWORD: slider
    ports:
      - "0:5432"  # host port assigned randomly — avoids collision with existing services
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slider -d slider_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data: